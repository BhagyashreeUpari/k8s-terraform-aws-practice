# Deployment with label: app=my-app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario4-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app        # pod has label app=my-app
    spec:
      containers:
      - name: app
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
# Service with WRONG selector — app=wrong-label
apiVersion: v1
kind: Service
metadata:
  name: scenario4-service
spec:
  selector:
    app: wrong-label       # WRONG — does not match pod label
  ports:
  - port: 80
    targetPort: 80