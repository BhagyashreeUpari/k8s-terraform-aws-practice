# Add to scenario2-crashloop.yaml
apiVersion: v1
kind: Pod
metadata:
  name: scenario2-fixed
spec:
  containers:
  - name: app
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "Starting application..."
      echo "Connecting to DB at $DB_HOST"
      echo "Application started successfully"
      sleep 3600
    env:
    - name: DB_HOST
      value: "postgres-service:5432"
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"