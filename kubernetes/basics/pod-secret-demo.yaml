apiVersion: v1
kind: Pod
metadata:
  name: secret-demo
spec:
  volumes:
  # Mount secret as files (for certificates)
  - name: secret-volume
    secret:
      secretName: app-secrets

  containers:
  - name: demo-app
    image: nginx:alpine

    env:
    # Individual secret key as env var
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: db-password

    - name: API_KEY
      valueFrom:
        secretKeyRef:
          name: app-secrets
          key: api-key

    # All secret keys as env vars at once
    envFrom:
    - secretRef:
        name: app-secrets

    # Secret mounted as files
    volumeMounts:
    - name: secret-volume
      mountPath: /etc/secrets
      readOnly: true

    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"