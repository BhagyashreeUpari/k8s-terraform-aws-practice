# Bind developer-role to ServiceAccount
# payment-service-sa now has developer permissions

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-rolebinding
  namespace: default
subjects:
# Can bind to User, Group, or ServiceAccount
- kind: ServiceAccount
  name: payment-service-sa
  namespace: default
roleRef:
  kind: Role
  name: developer-role
  apiGroup: rbac.authorization.k8s.io
---
# Bind readonly-role to a user
# User "support-engineer" gets read-only access

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: readonly-rolebinding
  namespace: default
subjects:
- kind: User
  name: support-engineer    # this user gets readonly access
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: readonly-role
  apiGroup: rbac.authorization.k8s.io